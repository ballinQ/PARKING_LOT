name: SmartParkingReminder
options:
  bundleIdPrefix: com.smartparking
  deploymentTarget:
    iOS: "17.0"
settings:
  base:
    SWIFT_VERSION: 5.0
    CURRENT_PROJECT_VERSION: 1
    MARKETING_VERSION: 0.1.0
    DEVELOPMENT_TEAM: ""

targets:
  SmartParkingReminder:
    type: application
    platform: iOS
    sources:
      - path: SmartParkingReminder
    resources:
      - path: SmartParkingReminder/Resources
    dependencies:
      - target: SmartParkingReminderWidgetExtension
        embed: true
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartparking.SmartParkingReminder
        GENERATE_INFOPLIST_FILE: YES
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_NSLocationWhenInUseUsageDescription: "Smart Parking Reminder can optionally capture your current location to save with a parking session."
        INFOPLIST_KEY_NSLocationUsageDescription: "Smart Parking Reminder can optionally capture your current location to save with a parking session."
        INFOPLIST_KEY_UIBackgroundModes: []
        INFOPLIST_KEY_LSApplicationQueriesSchemes:
          - comgooglemaps
    scheme:
      testTargets:
        - SmartParkingReminderTests
        - SmartParkingReminderUITests

  SmartParkingReminderWidgetExtension:
    type: app-extension
    platform: iOS
    sources:
      - path: SmartParkingReminderWidgetExtension
      - path: SmartParkingReminder/Activity/ParkingReminderActivityAttributes.swift
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartparking.SmartParkingReminder.widget
        INFOPLIST_FILE: SmartParkingReminderWidgetExtension/Info.plist
        APPLICATION_EXTENSION_API_ONLY: YES
        SKIP_INSTALL: YES

  SmartParkingReminderTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SmartParkingReminderTests
    dependencies:
      - target: SmartParkingReminder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartparking.SmartParkingReminderTests
        GENERATE_INFOPLIST_FILE: YES

  SmartParkingReminderUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SmartParkingReminderUITests
    dependencies:
      - target: SmartParkingReminder
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.smartparking.SmartParkingReminderUITests
        GENERATE_INFOPLIST_FILE: YES
